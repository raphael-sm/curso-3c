<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espotifie</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="esq">
            <button class="iconwrapper">
                <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/spotify-white-icon.png" class="mainicon">
            </button>
            <button class="iconwrapper">
                <img src="https://cdn-icons-png.flaticon.com/128/15429/15429582.png" class="icon">
            </button>
        </div>
        <div class="meio">
            <div class="pesquisa">
                <button class="iconwrapper">
                    <img src="https://cdn-icons-png.flaticon.com/128/11741/11741045.png" class="icon">
                </button>
                <input type="text" placeholder="O que você quer ouvir?">
                <div class="separator"></div>
                <button class="iconwrapper">
                    <img src="coll.png" class="icon">
                </button>
            </div>
        </div>
        <div class="dir">
            <a href="#" class="hoverlink">Premium</a>
            <a href="#" class="hoverlink">Suporte</a>
            <a href="#" class="hoverlink">Baixar</a>
            <div class="separator"></div>
            <a href="#" class="hoverlink"><img src="dw.png" class="iconS">&nbsp;Instalar Aplicativo</a>
            <a href="#" class="hoverlink">Inscrever-se</a>
            <button class="lgnbtn">
                <a href="#">Entrar</a>
            </button>
        </div>
    </header>
    <aside>
        <div class="titulo">
            <h3>Sua Biblioteca</h3>
            <button class="criar"><span class="big">+</span>&nbsp;Criar</button>
        </div>
        <div class="bibliotecas">
            <div class="secao">
                <h4>Crie sua primeira playlist</h4>
                <p>É fácil. Vamos te ajudar.</p>
                <button class="bibbtn">
                    <a href="#">Criar Playlist</a>
                </button>
            </div>
            <div class="secao">
                <h4>Que tal seguir um podcast novo?</h4>
                <p>É fácil. Vamos te ajudar.</p>
                <button class="bibbtn">
                    <a href="#">Criar Playlist</a>
                </button>
            </div>
        </div>
        <div class="links">
            <a href="#">Legal</a>
            <a href="#">Segurança e Centro de Privacidade</a>
            <a href="#">Política de Privacidade</a>
            <a href="#">Cookies</a>
            <a href="#">Sobre Anúncios</a>
            <a href="#">Acessibilidade</a>
        </div>
        <select class="ling">
            <option selected>Português do Brasil</option>
            <option>Português</option>
            <option>English</option>
            <option>Español</option>
            <option>Français</option>
            <option>Deutsch</option>
            <option>Italiano</option>
            <option>Руский</option>
            <option>한국인</option>
        </select>
    </aside>
    <main>

    </main>
</body>
</html>
