<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="head">
        <table width="100%">
            <tr>
                <td width="100%">
                    <img src="Logo.Anima_.FINAL-01-1-768x183-1.png" class="logoh">
                </td>
            </tr>
        </table>
    </header>
    <main>
        <div class="login">
            <form action="login.php" method="post">
                <fieldset class="loginform">
                    <h2>Cadastro</h2>
                    <label for="email">Digite seu Email:</label><br>
                    <input type="email" id="email"><br>
                    <label for="username">Digite seu nome de usuário:</label><br>
                    <input type="text" name="username" id="username"><br>
                    <label for="passwd">Digite sua senha:</label><br>
                    <input type="password" name="passwd" id="passwd"><br>
                    <label for="passwdc">Confirmar sua senha:</label><br>
                    <input type="password" name="passwdC" id="passwdC"><br>
                    <br>
                    <input class="lgnbtn" type="submit" value="Confirmar Cadastro">  
                </fieldset>
            </form>
        </div>
    </main>
</body>
</html>
