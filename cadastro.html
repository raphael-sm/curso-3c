<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Galeria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="head">
        <table width="100%">
            <tr>
                <td width="33%"></td>
                <td width="33%">
                    <img src="logoanima.png" class="logoh">
                </td>
                <td width="33%">
                    <img src="logout.png" class="logoutbutton">
                    <span>Sair</span>
                </td>
            </tr>
        </table>
    </header>
    <main>
        <div class="gallery">
            <form action="galeria.php" method="POST">
                <fieldset>
                    <div class="preview-container">
                        <img id="imagePreview">
                    </div>
                    <div class="upload">
                        <h2>Enviar nova Galeria</h2><br>
                        <input type="file" accept="image/*" multiple id="imageInput"><br>
                        <label for="sel">Selecione o Evento Associado:</label><br>
                        <select id="sel">
                            <option>EXEMPLO 1</option>
                            <option>EXEMPLO 2</option>
                            <option>EXEMPLO 3</option>
                        </select><br>
                        <label for="desc">Descrição(Opcional):</label><br>
                        <textarea id="desc" cols="33" class="descfield" maxlength="600" rows="6"></textarea><br>
                        <input type="submit" class="lgnbtn">
                    </div>
                </fieldset>
            </form>
        </div>
        <script>
            const imageInput = document.getElementById('imageInput');
            const imagePreview = document.getElementById('imagePreview');
    
            imageInput.addEventListener('change', function() {
                const file = this.files[0]; // Get the selected file
    
                if (file) {
                    // Generate a temporary local URL for the file
                    const objectURL = URL.createObjectURL(file);
                    
                    // Assign the URL to the image source and reveal the element
                    imagePreview.src = objectURL;
                    imagePreview.style.display = 'block';
                }
            });
        </script>
</body>
</html>
