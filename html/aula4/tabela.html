<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
</head>
<body>
    <table border="1px">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Rosvaldo</td>
                <td>26</td>
            </tr>
            <tr>
                <td>Leôncio</td>
                <td>30</td>
            </tr>
            <tr>
                <td>Jamilson</td>
                <td>35</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total de Pessoas: 3</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
