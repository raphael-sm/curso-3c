<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Faça as coisas o <b>mais simples</b> que você puder, <i>porém</i> não se restrinja às mais simples.</p>
    <p>Faça as coisas o <strong>mais simples</strong> que você puder, <em>porém</em> não se restrinja às mais simples.</p>
    <!-- Embora ambos possuam a mesma função visual, as tags <strong> e <em> contém valor semântico no SEO, ao contrário de <b> e <i>. -->
</body>
</html>
